version: 1.0.0
# This taxonomy defines the controlled vocabulary used by metric specs. The IDs
# in this file are intended to be referenced directly from YAML payloads, so new
# values should be added deliberately and existing IDs should not be renamed.
metadata:
  # `document_reference` should identify the methodology artifacts that justify
  # these categories. It is not meant to point to implementation tickets or
  # local working notes.
  name: FCRM Risk Assessment Metric Taxonomy
  owner: FCRM Spec Library Platform Team
  document_reference: "FY25 Methodology Deck (Slide 7) & Scope State Document"

# ===========================================================================
# 1. RISK DOMAINS (From RA Excel Mappings)
# ===========================================================================
# Risk domains are the highest-level classification for a metric. A metric may
# belong to more than one domain when the same underlying data point informs
# multiple assessments, so specs should store domains as a list rather than a
# single value.
risk_domains:
  - id: aml_ir
    label: "AML Inherent Risk"
  - id: sanctions_ir
    label: "Sanctions Inherent Risk"
  - id: abac_ir
    label: "ABAC Inherent Risk"

# ===========================================================================
# 2. RISK CATEGORIES (From Methodology Deck)
# ===========================================================================
# Risk categories provide the methodology-aligned buckets used to organize
# metrics within a domain. `factor_count` is a governance aid showing how many
# factors the methodology expects in each category; it is not itself a scoring
# rule and should not be treated as executable business logic.
risk_categories:
  - id: customer_risk
    label: "Customer Risk"
    factor_count: 11
  - id: products_services_risk
    label: "Products & Services Risk"
    factor_count: 2
  - id: transactional_risk
    label: "Transactional Risk"
    factor_count: 8
  - id: delivery_channel_risk
    label: "Delivery Channel Risk"
    factor_count: 2
  - id: operational_geographic_risk
    label: "Operational Geographic Risk"
    factor_count: 3
  - id: emerging_risk
    label: "Emerging Risk"
    factor_count: 5

# ===========================================================================
# 3. METRIC CLASSIFICATIONS
# ===========================================================================
# Metric types describe what kind of specification is being authored so tooling
# and reviewers can distinguish core BDEs from contextual or control-oriented
# metrics. Prefer these controlled values over introducing local synonyms.
metric_types:
  - id: base_data_element
    label: "Base Data Element (BDE)"
    description: "Core quantitative metric for inherent risk calculations"
  - id: supplemental
    label: "Supplemental Metric"
    description: "Contextual data points supporting inherent risk profiles"
  - id: control_metric
    label: "Control Metric"
    description: "Metrics assessing KYC, Investigations, or Reporting effectiveness"

# ===========================================================================
# 4. DATA SOURCE CATEGORIES (From Scope State Document, Section 4)
# ===========================================================================
# Data source categories capture the ownership pattern of the upstream data, not
# a specific table or file path. Specs can use these IDs to communicate whether
# a metric comes from enterprise-governed platforms or business-managed inputs.
data_source_categories:
  - id: rahona
    label: "Rahona Data Platform"
    systems:
      - CAEDW
      - CIF
      - S3S
      - MBNA
      - WCA
      - WCDA
      - ODR
      - BBCMN
  - id: adido
    label: "ADIDO Sources"
    description: "Business-managed side-loaded files and vendor extracts"
